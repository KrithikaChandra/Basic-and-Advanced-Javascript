<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 11 — Exercise</title>

    <style>
        .dark {
            background: #111;
            color: #eee;
        }

        .name-item {
            padding: 4px 8px;
        }

        .done {
            text-decoration: line-through;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <h1 id="title">JS Training</h1>

    <!-- Theme Toggle -->
    <button id="theme-btn">Toggle Theme</button>

    <!-- Simple Button -->
    <button id="my-btn">Button</button>
    <button id="new-btn">Button Color</button>

    <!-- Names List -->
    <ul id="names-list"></ul>
    <button id="add-name">Add Name</button>
    <input id="name-input" placeholder="Name Input" />

    <!-- Box and Cards -->
    <div id="box"></div>
    <div id="cards"></div>

    <!-- Click Counter -->
    <button id="counter-btn">Click me</button>
    <p>
        Clicks:
        <span id="count">0</span>
    </p>

    <!-- Live Input Preview -->
    <input id="live-input" placeholder="Type something..." />
    <p id="preview"></p>

    <!-- Registration Form -->
    <form id="reg-form">
        <input id="name-field" placeholder="Your name" />
        <button type="submit">Submit</button>
    </form>

    <p id="welcome"></p>

    <!-- Todo List -->
    <!--
    <ul id="todo-list">
        <li data-id="1">Buy milk</li>
        <li data-id="2">Walk dog</li>
        <li data-id="3">Pay bills</li>
    </ul>
    -->

    <ul id="todo-list">
        <li>Buy milk</li>
        <li>Walk dog</li>
        <li>Pay bills</li>
    </ul>

    <form id="sum-form">

    <input id="num1" type="number" placeholder="First number" />

    <input id="num2" type="number" placeholder="Second number" />

    <button type="submit">Add</button>

</form>

<p id="result"></p>

    <script src="hw.js"></script>

</body>
</html>
