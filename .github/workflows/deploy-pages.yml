# Publish the curriculum site to GitHub Pages (static HTML/CSS/JS).
#
# Before the first run works:
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# (One-time. Skip if you already picked GitHub Actions there.)
#
# Do NOT add actions/configure-pages unless Pages is enabled first — otherwise
# the workflow fails with "Get Pages site failed" / HTTP 404.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
