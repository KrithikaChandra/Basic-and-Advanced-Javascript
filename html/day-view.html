<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day — Practice</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7eef8;
      --muted: #9fb0c8;
      --accent: #5b9bd5;
      --accent-dim: #3d6f9c;
      --warn: #e0a84f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .layout {
      display: grid;
      grid-template-columns: min(280px, 32vw) 1fr;
      min-height: 100vh;
    }
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
      nav { border-right: none; border-bottom: 1px solid var(--border); }
    }
    nav {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 1.25rem 1rem 2rem;
      position: sticky;
      top: 0;
      align-self: start;
      max-height: 100vh;
      overflow-y: auto;
    }
    nav a.back {
      display: inline-block;
      margin-bottom: 1rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }
    nav a.back:hover { text-decoration: underline; }
    .day-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin: 0 0 0.75rem;
    }
    nav h1 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 1rem;
      line-height: 1.3;
    }
    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .nav-links a {
      padding: 0.45rem 0.6rem;
      border-radius: 6px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid transparent;
    }
    .nav-links a:hover {
      background: rgba(91, 155, 213, 0.12);
      border-color: var(--accent-dim);
    }
    .nav-links a.active {
      background: rgba(91, 155, 213, 0.2);
      border-color: var(--accent);
      color: var(--text);
      font-weight: 500;
    }
    .nav-links a.disabled {
      color: var(--muted);
      opacity: 0.45;
      pointer-events: none;
    }
    main {
      padding: 1.75rem clamp(1rem, 3vw, 2.5rem);
      max-width: 40rem;
    }
    main h2 {
      font-size: 1rem;
      margin: 0 0 0.75rem;
      font-weight: 600;
    }
    .hint {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 0 0 1rem;
    }
    .file-line {
      font-size: 0.85rem;
      color: var(--muted);
      word-break: break-all;
      margin-bottom: 1.25rem;
    }
    .file-line code {
      color: #c5d4e8;
      font-size: 0.82rem;
    }
    #status {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.25);
      font-size: 0.9rem;
      color: var(--muted);
    }
    #status.error {
      border-color: #8b4a4a;
      color: #f0b4b4;
    }
    #status.warn {
      border-color: #7a6230;
      color: #f5d78e;
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav aria-label="Day pages">
      <a class="back" href="../index.html">← Curriculum overview</a>
      <p class="day-label" id="day-label">Day</p>
      <h1 id="day-title">Loading…</h1>
      <div class="nav-links" id="nav-links"></div>
    </nav>
    <main>
      <h2 id="page-heading">Practice</h2>
      <p class="hint">Output appears in the browser console. Press <kbd>F12</kbd> (or <kbd>Ctrl+Shift+J</kbd>) and open the <strong>Console</strong> tab.</p>
      <p class="file-line">Loaded file: <code id="file-path"></code></p>
      <div id="status">Preparing script…</div>
    </main>
  </div>
  <script>
    (function () {
      var DAY_TOPICS = {
        4: "Day 4",
        5: "Day 5",
        6: "Functions",
        7: "Arrays",
        8: "Objects",
        9: "Day 9",
        10: "Day 10",
        11: "Day 11",
        12: "Day 12",
        13: "Day 13",
        14: "Day 14"
      };

      var CONFIG = {
        4: { lesson: null, handsOn: "hands-on.js", homework: null },
        5: { lesson: null, handsOn: "hands-on.js", homework: null },
        6: { lesson: "exercise.js", handsOn: "hands-on.js", homework: "hw.js" },
        7: { lesson: "exercise.js", handsOn: "hands-on.js", homework: "hw.js" },
        8: { lesson: "exercise.js", handsOn: "hands-on.js", homework: "hw.js" },
        9: { lesson: "exercise.js", handsOn: "hands-on.js", homework: "hw.js" },
        10: { lesson: "exercise.js", handsOn: null, homework: "hw.js" },
        11: { lesson: "exercise.js", handsOn: "hands-on.js", homework: "hw.js" },
        12: { lesson: "exercise.js", handsOn: "hands-on.js", homework: "hw.js" },
        13: { lesson: "exercise.js", handsOn: "hands-on.js", homework: "hw.js" },
        14: { lesson: "exercise.js", handsOn: "hands-on.js", homework: null }
      };

      var TYPE_KEY = { lesson: "lesson", "hands-on": "handsOn", homework: "homework" };
      var TYPE_LABEL = { lesson: "Lesson", "hands-on": "Hands-on", homework: "Homework" };

      var params = new URLSearchParams(window.location.search);
      var dayRaw = params.get("day");
      var typeRaw = (params.get("type") || "lesson").toLowerCase();
      var dayNum = parseInt(dayRaw, 10);
      if (!dayRaw || String(dayNum) !== String(dayRaw) || dayNum < 1) {
        dayNum = 6;
        typeRaw = "lesson";
      }
      if (!TYPE_KEY[typeRaw]) typeRaw = "lesson";

      var topic = DAY_TOPICS[dayNum] || ("Day " + dayNum);
      var titleText = "Day " + dayNum + " — " + topic;
      document.title = titleText + " — " + TYPE_LABEL[typeRaw];
      document.getElementById("day-label").textContent = "Day " + dayNum;
      document.getElementById("day-title").textContent = titleText;
      document.getElementById("page-heading").textContent = TYPE_LABEL[typeRaw];

      var cfg = CONFIG[dayNum];
      var nav = document.getElementById("nav-links");
      ["lesson", "hands-on", "homework"].forEach(function (t) {
        var key = TYPE_KEY[t];
        var a = document.createElement("a");
        a.href = "day-view.html?day=" + dayNum + "&type=" + t;
        a.textContent = TYPE_LABEL[t];
        if (t === typeRaw) a.className = "active";
        if (!cfg || !cfg[key]) {
          a.className = (a.className ? a.className + " " : "") + "disabled";
          a.removeAttribute("href");
        }
        nav.appendChild(a);
      });

      var statusEl = document.getElementById("status");
      var filePathEl = document.getElementById("file-path");

      if (!cfg) {
        statusEl.textContent = "No configuration for day " + dayNum + ".";
        statusEl.className = "error";
        filePathEl.textContent = "—";
        return;
      }

      var file = cfg[TYPE_KEY[typeRaw]];
      if (!file) {
        statusEl.textContent = "This page is not set up for this day (no file in the js folder).";
        statusEl.className = "warn";
        filePathEl.textContent = "—";
        return;
      }

      var base = "../js/day%20" + dayNum + "/";
      var src = base + encodeURIComponent(file);
      filePathEl.textContent = "js/day " + dayNum + "/" + file;

      var script = document.createElement("script");
      script.src = src;
      script.async = false;
      script.onload = function () {
        statusEl.textContent = "Script finished loading. Check the console for logs and any runtime errors.";
        statusEl.className = "";
      };
      script.onerror = function () {
        statusEl.textContent = "Could not load the script. Check that the file exists at js/day " + dayNum + "/" + file;
        statusEl.className = "error";
      };
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
